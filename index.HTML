<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Airbase Explorer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    :root {
        --accent-color: #00ff41; /* Tactical Green */
        --bg-panel: rgba(15, 23, 42, 0.9);
        --text-color: #e2e8f0;
    }

    body, html { margin:0; padding:0; height:100%; font-family: 'Courier New', Courier, monospace; background: #000; overflow: hidden; }
    #map { width:100%; height:100%; }

    /* Tactical HUD */
    #controls {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 1000;
        background: var(--bg-panel);
        color: var(--text-color);
        padding: 20px;
        border-radius: 4px;
        border: 1px solid var(--accent-color);
        box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        width: 250px;
        backdrop-filter: blur(8px);
    }

    h3 {
        margin: 0 0 15px 0;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--accent-color);
        border-bottom: 1px solid var(--accent-color);
        padding-bottom: 5px;
    }

    label {
        font-size: 11px;
        text-transform: uppercase;
        display: block;
        margin-top: 15px;
        color: #94a3b8;
    }

    select {
        background: #1e293b;
        color: white;
        border: 1px solid #334155;
        padding: 8px;
        width: 100%;
        margin-top: 5px;
        cursor: pointer;
        outline: none;
    }

    select:focus { border-color: var(--accent-color); }

    /* Coordinate Display */
    #coords-info {
        position: absolute;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
        background: var(--bg-panel);
        color: var(--accent-color);
        padding: 8px 15px;
        font-size: 12px;
        border: 1px solid var(--accent-color);
        pointer-events: none;
    }

    .reset-btn {
        margin-top: 20px;
        background: transparent;
        border: 1px solid #ef4444;
        color: #ef4444;
        padding: 5px;
        width: 100%;
        cursor: pointer;
        font-size: 10px;
        text-transform: uppercase;
    }

    .reset-btn:hover { background: #ef4444; color: white; }

    /* Custom Leaflet Styling */
    .leaflet-popup-content-wrapper { background: var(--bg-panel); color: white; border: 1px solid var(--accent-color); border-radius: 0; }
    .leaflet-popup-tip { background: var(--accent-color); }
</style>
</head>
<body>

<div id="controls">
    <h3>AIRBASE OBSERVER</h3>

    <label>Mission Area</label>
    <select id="country-select">
        <option value="">-- GLOBAL VIEW --</option>
        <option value="US">United States</option>
        <option value="CN">China</option>
        <option value="RU">Russia</option>
        <option value="UK">United Kingdom</option>
        <option value="FR">France</option>
        <option value="IL">Israel</option>
        <option value="IN">India</option>
        <option value="PK">Pakistan</option>
        <option value="AU">Australia</option>
        <option value="KP">North Korea</option>
        <option value="JP">Japan</option>
        <option value="BR">Brazil</option>
    </select>

    <div id="base-container" style="display:none;">
        <label>Target Facility</label>
        <select id="base-select">
            <option value="">-- Select Base --</option>
        </select>
    </div>

    <button class="reset-btn" onclick="resetMap()">Reset Observation</button>
</div>

<div id="coords-info">LAT: 0.0000 | LNG: 0.0000</div>
<div id="map"></div>

// Map Setup
const map = L.map('map', {
    zoomControl: false // Move zoom control for cleaner UI
}).setView([20,0], 2);

L.control.zoom({ position: 'bottomleft' }).addTo(map);
L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(map);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19,
    attribution: 'Esri & OSINT Observer'
}).addTo(map);

const markersLayer = L.layerGroup().addTo(map);
const coordsDisplay = document.getElementById('coords-info');

// Update coordinates on mouse move
map.on('mousemove', e => {
    const { lat, lng } = e.latlng;
    coordsDisplay.innerHTML = `LAT: ${lat.toFixed(4)} | LNG: ${lng.toFixed(4)}`;
});

function showBases(countryCode) {
    markersLayer.clearLayers();
    const baseContainer = document.getElementById('base-container');
    const baseSelect = document.getElementById('base-select');
    
    baseSelect.innerHTML = '<option value="">-- SELECT TARGET --</option>';

    if(!countryCode || !bases[countryCode]) {
        baseContainer.style.display = 'none';
        return;
    }

    const latlngs = [];
    bases[countryCode].forEach((b, i) => {
        // A MAGIA ACONTECE AQUI: { autoPan: false } adicionado
        const marker = L.marker([b.lat, b.lng])
            .bindPopup(`<div style="color:white"><b>BASE:</b> ${b.name}<br><b>COORDS:</b> ${b.lat}, ${b.lng}</div>`, { autoPan: false })
            .addTo(markersLayer);
        
        b.marker = marker;
        latlngs.push([b.lat, b.lng]);

        const opt = document.createElement('option');
        opt.value = i;
        opt.text = b.name.toUpperCase();
        baseSelect.appendChild(opt);
    });

    baseContainer.style.display = 'block';
    const bounds = L.latLngBounds(latlngs);
    map.fitBounds(bounds.pad(0.2), { animate: true });
}

function resetMap() {
    document.getElementById('country-select').value = "";
    document.getElementById('base-container').style.display = 'none';
    markersLayer.clearLayers();
    map.setView([20,0], 2);
}

document.getElementById('country-select').addEventListener('change', e => showBases(e.target.value));

document.getElementById('base-select').addEventListener('change', e => {
    const countryCode = document.getElementById('country-select').value;
    const idx = parseInt(e.target.value);
    if(isNaN(idx)) return;

    const b = bases[countryCode][idx];
    
    // TACTICAL ZOOM: Level 14 com a coordenada cravada no centro geométrico
    map.setView([b.lat, b.lng], 14, { animate: true });
    
    // Agora o popup abre sem estragar a centralização
    b.marker.openPopup();
});
